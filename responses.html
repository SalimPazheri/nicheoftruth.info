<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Login | Niche of Truth</title>
    <link rel="icon" href="./assets/nicheoftruth-logo.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="page">
    <header class="topbar">
      <a class="brand brand--dark" href="./index.html">
        <span class="brand__mark brand__mark--image">
          <img src="./assets/nicheoftruth-logo.png" alt="" aria-hidden="true">
        </span>
        <span>
          <strong>Niche of Truth</strong>
          <small>Feedback admin</small>
        </span>
      </a>
    </header>

    <main class="table-shell">
      <section class="panel panel--wide" id="loginPanel">
        <p class="eyebrow eyebrow--dark">Admin login</p>
        <h1>Feedback entries</h1>
        <p class="muted">Login to view submitted feedback.</p>

        <form id="loginForm" class="feedback-form">
          <label>
            Email
            <input id="loginEmail" name="email" type="email" autocomplete="username" required>
          </label>

          <label>
            Password
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
          </label>

          <button class="button button--submit" type="submit">Login</button>
          <p id="loginMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel panel--wide" id="entriesPanel" hidden>
        <div class="table-heading">
          <div>
            <p class="eyebrow eyebrow--dark">Admin feedback list</p>
            <h1>Feedback entries</h1>
          </div>
          <button class="button button--secondary-dark" id="logoutButton" type="button">Logout</button>
        </div>

        <form id="entriesFilters" class="filters">
          <label>
            Submitted date
            <input id="dateFilter" name="date" type="date">
          </label>

          <label>
            District
            <select id="districtFilter" name="district">
              <option value="">All districts</option>
              <option>Thiruvananthapuram</option>
              <option>Kollam</option>
              <option>Pathanamthitta</option>
              <option>Alappuzha</option>
              <option>Kottayam</option>
              <option>Idukki</option>
              <option>Ernakulam</option>
              <option>Thrissur</option>
              <option>Palakkad</option>
              <option>Malappuram</option>
              <option>Kozhikode</option>
              <option>Wayanad</option>
              <option>Kannur</option>
              <option>Kasaragod</option>
            </select>
          </label>

          <button class="button button--secondary-dark" type="submit">Search</button>
          <button class="button button--secondary-dark" id="clearFilters" type="button">Clear</button>
        </form>

        <p id="entriesStatus" class="form-message" aria-live="polite"></p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Phone</th>
                <th>District</th>
                <th>Feedback</th>
              </tr>
            </thead>
            <tbody id="entriesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js"></script>
  </body>
</html>
