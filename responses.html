<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Login | Niche of Truth</title>
    <link rel="icon" href="./assets/nicheoftruth-logo.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="page">
    <header class="topbar">
      <a class="brand brand--dark" href="./index.html">
        <span class="brand__mark brand__mark--image">
          <img src="./assets/nicheoftruth-logo.png" alt="" aria-hidden="true">
        </span>
        <span>
          <strong data-i18n="brand.name">Niche of Truth</strong>
          <small data-i18n="brand.admin">Feedback admin</small>
        </span>
      </a>
      <label class="language-control language-control--dark">
        <span data-i18n="language.label">Language</span>
        <select id="languageSelect" aria-label="Language">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="ar">Arabic</option>
        </select>
      </label>
    </header>

    <main class="table-shell">
      <section class="panel panel--wide" id="loginPanel">
        <p class="eyebrow eyebrow--dark" data-i18n="admin.loginEyebrow">Admin login</p>
        <h1 data-i18n="admin.entriesTitle">Feedback entries</h1>
        <p class="muted" data-i18n="admin.loginIntro">Login to view submitted feedback.</p>

        <form id="loginForm" class="feedback-form">
          <label>
            <span data-i18n="admin.email">Email</span>
            <input id="loginEmail" name="email" type="email" autocomplete="username" required>
          </label>

          <label>
            <span data-i18n="admin.password">Password</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
          </label>

          <button class="button button--submit" type="submit" data-i18n="admin.login">Login</button>
          <p id="loginMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel panel--wide" id="entriesPanel" hidden>
        <div class="table-heading">
          <div>
            <p class="eyebrow eyebrow--dark" data-i18n="admin.listEyebrow">Admin feedback list</p>
            <h1 data-i18n="admin.entriesTitle">Feedback entries</h1>
          </div>
          <button class="button button--secondary-dark" id="logoutButton" type="button" data-i18n="admin.logout">Logout</button>
        </div>

        <form id="entriesFilters" class="filters">
          <label>
            <span data-i18n="admin.submittedDate">Submitted date</span>
            <input id="dateFilter" name="date" type="date">
          </label>

          <label>
            <span data-i18n="feedback.district">District</span>
            <select id="districtFilter" name="district">
              <option value="" data-i18n="district.all">All districts</option>
              <option value="Thiruvananthapuram" data-i18n="district.thiruvananthapuram">Thiruvananthapuram</option>
              <option value="Kollam" data-i18n="district.kollam">Kollam</option>
              <option value="Pathanamthitta" data-i18n="district.pathanamthitta">Pathanamthitta</option>
              <option value="Alappuzha" data-i18n="district.alappuzha">Alappuzha</option>
              <option value="Kottayam" data-i18n="district.kottayam">Kottayam</option>
              <option value="Idukki" data-i18n="district.idukki">Idukki</option>
              <option value="Ernakulam" data-i18n="district.ernakulam">Ernakulam</option>
              <option value="Thrissur" data-i18n="district.thrissur">Thrissur</option>
              <option value="Palakkad" data-i18n="district.palakkad">Palakkad</option>
              <option value="Malappuram" data-i18n="district.malappuram">Malappuram</option>
              <option value="Kozhikode" data-i18n="district.kozhikode">Kozhikode</option>
              <option value="Wayanad" data-i18n="district.wayanad">Wayanad</option>
              <option value="Kannur" data-i18n="district.kannur">Kannur</option>
              <option value="Kasaragod" data-i18n="district.kasaragod">Kasaragod</option>
            </select>
          </label>

          <button class="button button--secondary-dark" type="submit" data-i18n="admin.search">Search</button>
          <button class="button button--secondary-dark" id="clearFilters" type="button" data-i18n="admin.clear">Clear</button>
        </form>

        <p id="entriesStatus" class="form-message" aria-live="polite"></p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="admin.date">Date</th>
                <th data-i18n="feedback.name">Name</th>
                <th data-i18n="admin.phone">Phone</th>
                <th data-i18n="feedback.district">District</th>
                <th data-i18n="feedback.message">Feedback</th>
              </tr>
            </thead>
            <tbody id="entriesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./script.js"></script>
  </body>
</html>
